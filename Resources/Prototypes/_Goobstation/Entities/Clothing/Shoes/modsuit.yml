    sprite: _Goobstation/Clothing/Shoes/Modsuits/headofsecurity.rsi
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: ModifyStandingUpTime
    multiplier: 0.5
  - type: Armor
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.8
