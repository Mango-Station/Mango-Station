## Parent File to easily add more attributes, here it's used for plasmaman mostly
- type: entity
  abstract: true
  parent: ClothingShoesBase
  id: ClothingShoesModsuitBase
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Goobstation/Clothing/Shoes/Modsuits/standard.rsi
    state: null
    layers:
    - state: boots
    - state: boots-sealed
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ feet ]
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-boots
    sealDownPopup: sealable-clothing-seal-down-boots
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      shoes:
      - state: equipped-FEET-sealed
  - type: Armor
    traumaDeductions:
      Dismemberment: 0.1
      OrganDamage: 0.1
      BoneDamage: 0.1
      VeinsDamage: 0
  - type: Tag
    tags:
    - PlasmamanSafe
    - WhitelistChameleon
  - type: IgniteFromGasImmunity
    parts:
    - FootLeft
    - FootRight

- type: entity
  parent: ClothingShoesModsuitBase
  id: ClothingModsuitBootsStandard
  name: standard modsuit boots
  description: A special modular suit boots designed for compact folding inside modular suit control.
  categories: [ HideSpawnMenu ]

- type: entity
  parent: [ ClothingShoesModsuitBase, BaseModsuitPieceSecurity ]
  id: ClothingModsuitBootsSecurity
  name: soldat modsuit boots
  description: THE IRON BOOTS OF THE LAW.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Shoes/Modsuits/security.rsi
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: ModifyStandingUpTime
    multiplier: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9

- type: entity
  parent: [ ClothingShoesModsuitBase, BaseModsuitPieceHOS ]
  id: ClothingModsuitBootsHeadOfSecurity
  name: bulwark modsuit boots
  description: I call these my commie stompers.
  categories: [ HideSpawnMenu ]
